# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install minification tools
        run: npm install -g terser lightningcss-cli
      - name: Build minified dist
        run: |
          mkdir -p dist/favicon
          cp index.html sw.js dist/
          cp -r favicon/. dist/favicon/
          terser app.js           -o dist/app.js           --compress --mangle
          terser todoist.js       -o dist/todoist.js       --compress --mangle
          terser supabase-auth.js -o dist/supabase-auth.js --compress --mangle
          lightningcss --minify styles.css -o dist/styles.css
          lightningcss --minify auth.css   -o dist/auth.css
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
